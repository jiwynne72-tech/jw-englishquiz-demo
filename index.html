<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Games - Ultimate Edition</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2c5364">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3892/3892743.png">

<style>
:root {
  --glass: rgba(255, 255, 255, 0.1);
  --glass-border: rgba(255, 255, 255, 0.2);
  --text-shadow: 0 2px 10px rgba(0,0,0,0.3);
}

body {
  font-family: 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  text-align: center;
  color: #fff;
  transition: background 0.8s ease;
  margin: 0;
  padding: 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* BACKGROUNDS */
.bg-wall { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); }
.bg-connection { background: linear-gradient(135deg, #134e5e, #71b280); }
.bg-date { background: linear-gradient(135deg, #8e2de2, #4a00e0); }
.bg-odd { background: linear-gradient(135deg, #cb2d3e, #ef473a); }
.bg-sayings { background: linear-gradient(135deg, #41295a, #2f0743); }

h1 {
  margin-top: 40px;
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: -1px;
  text-shadow: var(--text-shadow);
  color: #ffffff;
}

.subtitle {
  font-size: 1.2rem;
  font-weight: 300;
  margin-bottom: 15px;
  color: #ffffff;
  letter-spacing: 1px;
}

.sample-notice {
  font-size: 0.8rem;
  font-style: italic;
  font-weight: 400;
  margin-bottom: 35px;
  color: #ffffff;
  max-width: 550px;
  line-height: 1.5;
}

.sample-notice a { color: #ffffff; text-decoration: underline; }

/* BUTTONS */
button {
  padding: 16px 32px;
  margin: 10px;
  font-size: 15px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  border-radius: 50px;
  border: 1px solid var(--glass-border);
  color: white;
  backdrop-filter: blur(5px);
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

button:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(0,0,0,0.3); }

.btn-wall { background: rgba(52, 152, 219, 0.4); }
.btn-connection { background: rgba(46, 204, 113, 0.4); }
.btn-date { background: rgba(155, 89, 182, 0.4); }
.btn-odd { background: rgba(231, 76, 60, 0.4); }
.btn-sayings { background: rgba(241, 196, 15, 0.4); }
.btn-ui { background: rgba(255, 255, 255, 0.15); font-size: 12px; }

/* WHATSAPP LOGO SECTION */
.contact-section {
  margin-top: 50px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

.logo-wrapper {
  position: relative;
  display: inline-block;
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.logo-wrapper:hover {
  transform: scale(1.1);
}

.main-logo {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  object-fit: cover;
  filter: invert(0.9) brightness(1.2);
  transition: filter 0.3s ease;
  border: 2px solid var(--glass-border);
}

.logo-wrapper:hover .main-logo {
  filter: invert(0) brightness(1); /* Returns to original colors on hover */
  border-color: #25d366;
}

.wa-badge {
  position: absolute;
  bottom: 0;
  right: 0;
  width: 32px;
  height: 32px;
  background: #25d366;
  border-radius: 50%;
  padding: 5px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.3s ease;
}

.logo-wrapper:hover .wa-badge {
  transform: scale(1.2);
}

/* TILES & GAME AREA */
.tile { padding: 25px 15px; border-radius: 20px; background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); font-size: 1.1rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; min-height: 60px; transition: all 0.4s ease; color: #ffffff; }
.tile:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.03); }
.grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; max-width: 700px; margin: 20px auto; }
.row { display: flex; justify-content: center; flex-wrap: wrap; gap: 20px; }
.answer { margin: 30px 0; font-size: 1.8rem; color: #f1c40f; font-weight: 700; min-height: 40px; }

.footer { position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.3); color: #ffffff; text-align: center; padding: 8px; font-size: 10px; backdrop-filter: blur(5px); }
</style>
</head>
<body class="bg-wall">

<h1 id="title">TIME TO QUIZ</h1>
<div id="subtitle" class="subtitle">Learning English can be engaging, challenging, and genuinely fun.</div>

<div id="sampleInfo" class="sample-notice">
  This is a sample version. The full version includes 10 full activities, over 800 questions, exercises, and more. 
  <a href="mailto:james_wynne@hotmail.com">Contact me</a> for more info.
</div>

<div id="gameContainer">
    <div id="menu">
        <button class="btn-wall" onclick="startGame('wall')">The Wall</button>
        <button class="btn-connection" onclick="startGame('connection')">Connections</button>
        <button class="btn-date" onclick="startGame('date')">Chronology</button>
        <button class="btn-odd" onclick="startGame('odd')">Odd One Out</button>
        <button class="btn-sayings" onclick="startGame('sayings')">English Sayings</button>
        
        <div class="contact-section">
            <a href="https://wa.link/sil3dz" target="_blank" class="logo-wrapper">
                <img src="my logo en.jpg" alt="JW Logo" class="main-logo">
                <div class="wa-badge">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="white">
                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L0 24l6.335-1.662c1.72.938 3.659 1.434 5.628 1.434h.011c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
                    </svg>
                </div>
            </a>
        </div>
    </div>
    <div id="gameArea"></div>
</div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type){
  let osc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.frequency.value = type==="correct" ? 650 : type==="wrong" ? 140 : type==="reveal" ? 900 : 400;
  osc.start(); gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);
  osc.stop(audioCtx.currentTime + 0.4);
}

const wallData = [
  { groups: [["look after","give up","find out"], ["money","price","cost"], ["quickly","slowly","carefully"]], labels: ["phrasal verbs","money","adverbs"] },
  { groups: [["cinema","theater","museum"], ["park","beach","forest"], ["bank","school","church"]], labels: ["cultural venues","nature spots","community buildings"] },
  { groups: [["walk","hike","stroll"], ["yell","whisper","chat"], ["look","glance","stare"]], labels: ["ways to move","ways to speak","ways to see"] }
];

const connectionData = [
  { clues: ["You use them every day", "They help you communicate", "They change depending on context", "They can be formal or informal"], answer: "Language" },
  { clues: ["It happens every 4 years", "Athletes from all over", "Gold, Silver, and Bronze", "The five rings"], answer: "The Olympic Games" }
];

const dateData = [
  { date: "1989", options: ["Fall of the Berlin Wall", "World War II begins", "First iPhone released"], answer: "Fall of the Berlin Wall" }
];

const oddData = [
  { options: ["Dog","Cat","Car","Horse"], answer: "Car" }
];

const sayingsData = [
  { phrase: "Break the ice", meaning: "To start a conversation or socialize in a tense situation." }
];

// Helper to keep the menu HTML string for non-reload switching
const menuHTML = document.getElementById("menu").innerHTML;

function showMenu(){
  playSound("click");
  document.body.className = "bg-wall";
  document.getElementById("title").innerText="English Games";
  document.getElementById("subtitle").innerText = "Get your thinking caps on!";
  document.getElementById("sampleInfo").style.display = "block";
  document.getElementById("gameArea").innerHTML = "";
  document.getElementById("menu").innerHTML = menuHTML;
}

function startGame(type){
  playSound("click");
  document.getElementById("menu").innerHTML=""; 
  document.getElementById("gameArea").innerHTML="";
  document.getElementById("sampleInfo").style.display = "none";

  if(type==="wall") { document.body.className = "bg-wall"; document.getElementById("title").innerText="THE WALL"; document.getElementById("subtitle").innerText = "Find three connected groups."; loadWall(); }
  if(type==="connection") { document.body.className = "bg-connection"; document.getElementById("title").innerText="CONNECTIONS"; document.getElementById("subtitle").innerText = "What links these clues?"; loadConnection(); }
  if(type==="date") { document.body.className = "bg-date"; document.getElementById("title").innerText="CHRONOLOGY"; document.getElementById("subtitle").innerText = "What happened this year?"; loadDate(); }
  if(type==="odd") { document.body.className = "bg-odd"; document.getElementById("title").innerText="ODD ONE OUT"; document.getElementById("subtitle").innerText = "Spot the odd word!"; loadOdd(); }
  if(type==="sayings") { document.body.className = "bg-sayings"; document.getElementById("title").innerText="ENGLISH SAYINGS"; document.getElementById("subtitle").innerText = "Idioms test!"; loadSayings(); }
}

function loadWall(){
  let set = wallData[Math.floor(Math.random()*wallData.length)];
  let tiles = set.groups.flat().sort(()=>Math.random()-0.5);
  let html = `<div class="grid">`;
  tiles.forEach(t=>{ html += `<div class="tile" onclick="selectTile(this,'${t.replace(/'/g, "\\'")}')">${t}</div>`; });
  html += `</div><br><button class="btn-wall" onclick="checkGroup()">Check Group</button><button class="btn-wall" onclick="resolveWall()">Resolve</button><br><br>`;
  html += `<button class="btn-ui" onclick="startGame('wall')">Next Puzzle</button><button class="btn-ui" onclick="showMenu()">⬅ Home</button>`;
  document.getElementById("gameArea").innerHTML = html;
  window.currentWall = set; window.selectedTiles = [];
}

function selectTile(el, word){
  playSound("click"); if(el.classList.contains("correct")) return;
  if(el.classList.contains("selected")){ el.classList.remove("selected"); window.selectedTiles = window.selectedTiles.filter(w=>w!==word); }
  else if(window.selectedTiles.length < 3){ el.classList.add("selected"); window.selectedTiles.push(word); }
}

function checkGroup(){
  if(window.selectedTiles.length !== 3) return;
  let correctGroup = window.currentWall.groups.find(group => group.every(word => window.selectedTiles.includes(word)));
  let domTiles = document.querySelectorAll(".tile");
  if(correctGroup){ playSound("correct"); domTiles.forEach(t=>{ if(window.selectedTiles.includes(t.innerText)){ t.classList.remove("selected"); t.classList.add("correct"); } }); }
  else { playSound("wrong"); domTiles.forEach(t=>{ if(window.selectedTiles.includes(t.innerText)) t.classList.add("wrong"); }); setTimeout(()=>{ domTiles.forEach(t=>t.classList.remove("wrong","selected")); },600); }
  window.selectedTiles = [];
}

function resolveWall(){
  playSound("reveal");
  let colors = ["#2ecc71","#3498db","#f1c40f"];
  let html = `<div class="grid">`;
  window.currentWall.groups.forEach((group,i)=>{ group.forEach(word=>{ html += `<div class="tile" style="background:${colors[i]} !important; box-shadow:none;">${word}</div>`; }); });
  html += `</div><div class="answer">${window.currentWall.labels.join(" // ")}</div>`;
  html += `<button class="btn-ui" onclick="startGame('wall')">Next Puzzle</button><button class="btn-ui" onclick="showMenu()">⬅ Home</button>`;
  document.getElementById("gameArea").innerHTML = html;
}

function loadConnection(){
  let set = connectionData[Math.floor(Math.random()*connectionData.length)];
  window.clueIdx = 0; window.currentSet = set;
  document.getElementById("gameArea").innerHTML = `<div id="clueBox" style="min-height:200px"></div><button class="btn-connection" onclick="nextClue()">Next Clue</button><button class="btn-connection" onclick="document.getElementById('cAns').innerText=window.currentSet.answer; playSound('reveal')">Show Answer</button><br><div id="cAns" class="answer"></div><br><button class="btn-ui" onclick="startGame('connection')">Next Connection</button><button class="btn-ui" onclick="showMenu()">⬅ Home</button>`;
  nextClue();
}

function nextClue(){ if(window.clueIdx < window.currentSet.clues.length){ playSound("click"); let div = document.createElement("div"); div.className = "clue"; div.innerText = window.currentSet.clues[window.clueIdx]; document.getElementById("clueBox").appendChild(div); window.clueIdx++; } }

function loadDate(){
  let set = dateData[Math.floor(Math.random()*dateData.length)];
  let opts = [...set.options].sort(()=>Math.random()-0.5);
  let html = `<div class="date-clue">${set.date}</div><div class="row">`;
  opts.forEach(o => { html += `<div class="tile big-option" onclick="evalAns(this,'${o.replace(/'/g,"\\'")}','${set.answer.replace(/'/g,"\\")}')">${o}</div>`; });
  html += `</div><br><br><button class="btn-ui" onclick="startGame('date')">Next Date</button><button class="btn-ui" onclick="showMenu()">⬅ Home</button>`;
  document.getElementById("gameArea").innerHTML = html;
}

function loadOdd(){
  let set = oddData[Math.floor(Math.random()*oddData.length)];
  let opts = [...set.options].sort(()=>Math.random()-0.5);
  let html = `<div class="row">`;
  opts.forEach(o => { html += `<div class="tile odd-tile" onclick="evalAns(this,'${o.replace(/'/g,"\\'")}','${set.answer.replace(/'/g,"\\")}')">${o}</div>`; });
  html += `</div><br><br><button class="btn-ui" onclick="startGame('odd')">Next Odd One</button><button class="btn-ui" onclick="showMenu()">⬅ Home</button>`;
  document.getElementById("gameArea").innerHTML = html;
}

function loadSayings(){
  let set = sayingsData[Math.floor(Math.random()*sayingsData.length)];
  let html = `<div class="saying-text">"${set.phrase}"</div>`;
  html += `<div id="sAns" class="answer"></div><br>`;
  html += `<button class="btn-sayings" onclick="document.getElementById('sAns').innerText='${set.meaning.replace(/'/g, "\\'")}'; playSound('reveal')">See Meaning</button><br>`;
  html += `<button class="btn-ui" onclick="startGame('sayings')">Next Saying</button><button class="btn-ui" onclick="showMenu()">⬅ Home</button>`;
  document.getElementById("gameArea").innerHTML = html;
}

function evalAns(el, choice, correct){ if(choice === correct) { playSound("correct"); el.classList.add("correct"); } else { playSound("wrong"); el.classList.add("wrong"); } }

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('Service Worker Registered'))
      .catch(err => console.error('Service Worker Failed', err));
  });
}
</script>
