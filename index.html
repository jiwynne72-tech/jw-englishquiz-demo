<script>


function revealWall() {
    if(window.wallTimer) clearInterval(window.wallTimer);
    playSound("reveal");
    const colors = ['#2ecc71', '#3498db', '#9b59b2']; // Green, Blue, Purple
    
    let html = `<div class="grid">`;
    
    // Step 1: Just show the colored tiles
    window.currentWall.groups.forEach((group, index) => {
        group.forEach(word => {
            html += `<div class="tile" style="background:${colors[index]} !important; border:none;">${word}</div>`;
        });
    });
    
    html += `</div>`;
    
    // Step 2: Show the middle-man button
    html += `<div id="connectionContainer" style="margin-top:20px;">
                <button class="btn-wall" style="background:#f1c40f; color:#000;" onclick="revealLabels()">What Connects The Clues?</button>
             </div>`;

    // Step 3: Container for labels (initially empty)
    html += `<div id="labelsArea" style="margin-top:20px;"></div>`;
    
    html += `<div id="navigationButtons" style="display:none; margin-top:20px;">
                <button class="btn-ui" onclick="startGame('wall')">Next Puzzle</button>
                <button class="btn-ui" onclick="showMenu()">⬅ Home</button>
             </div>`;
             
    document.getElementById("gameArea").innerHTML = html;
}


function toggleMusic() {
    const music = document.getElementById("bgMusic");
    const btn = document.getElementById("musicBtn");

    if (music.paused) {
        music.play().catch(error => {
            console.log("Playback failed. Interaction needed first.");
        });
        btn.innerHTML = "🔊"; // Volume Up Icon
        btn.classList.add("music-on");
    } else {
        music.pause();
        btn.innerHTML = "🔈"; // Muted Icon
        btn.classList.remove("music-on");
    }
}

// Optional: Start music on the first game click if it's not already playing
document.addEventListener('click', function() {
    const music = document.getElementById("bgMusic");
    // This ensures that as soon as they click "Start Game", music can play
    if (music.paused && !window.musicStartedManually) {

    }

function revealLabels() {
    playSound("correct");
    const colors = ['#2ecc71', '#3498db', '#9b59b2'];
    let html = "";
    
    // Reveal the actual categories
    window.currentWall.labels.forEach((label, index) => {
        html += `<div class="clue" style="border-left-color:${colors[index]}"><strong>Group ${index + 1}:</strong> ${label}</div>`;
    });
    
    document.getElementById("labelsArea").innerHTML = html;
    
    // Hide the question button and show the Home/Next buttons
    document.getElementById("connectionContainer").style.display = "none";
    document.getElementById("navigationButtons").style.display = "block";
}

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    // This line "wakes up" the sound if the browser blocked it
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }

    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    osc.connect(gain); 
    gain.connect(audioCtx.destination);

    // Set sounds based on action
    if (type === "correct") {
        osc.frequency.setValueAtTime(650, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.1);
    } else if (type === "wrong") {
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
    } else if (type === "reveal") {
        osc.frequency.setValueAtTime(440, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
    } else {
        osc.frequency.value = 400; // Default click
    }

    osc.start(); 
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3);
    osc.stop(audioCtx.currentTime + 0.3);
}

// --- DATA ---

// CONNECTIONS SCORING LOGIC
function loadConnection(){
    let newSet;
    do {
        newSet = connectionData[Math.floor(Math.random() * connectionData.length)];
    } while (newSet === window.currentSet && connectionData.length > 1);

    window.clueIdx = 0; 
    window.currentSet = newSet;
    window.currentScore = 10;
    window.connTimeLeft = 60; // Logic for the timer

    document.getElementById("gameArea").innerHTML = `
    <div id="score" class="score-display">Potential Score: 10</div>
    <div id="clueBox" style="min-height:180px"></div>
    <button class="btn-connection" onclick="nextClue()">Next Clue</button>
    <button class="btn-connection" onclick="revealConnection()">Show Answer</button>
    <div id="cAns" class="answer"></div>
    
    <div class="timer-container">
        <div id="connectionTimerBar" class="timer-bar" style="background: #2ecc71 !important; width: 100%;"></div>
    </div>

    <div style="margin-top:10px">
        <button class="btn-ui" onclick="startGame('connection')">Next Puzzle</button>
        <button class="btn-ui" onclick="showMenu()">⬅ Home</button>
    </div>`;
    
    // START THE TIMER
    if(window.connTimer) clearInterval(window.connTimer);
    const connBar = document.getElementById("connectionTimerBar");
    window.connTimer = setInterval(() => {
        window.connTimeLeft--;
        let percentage = (window.connTimeLeft / 60) * 100;
        connBar.style.width = percentage + "%";
        
        if(window.connTimeLeft <= 0) {
            clearInterval(window.connTimer);
            revealConnection(true); 
        }
    }, 1000);

    nextClue();
}


function revealConnection(isTimeUp = false) {
    // Stop the timer immediately
    if(window.connTimer) clearInterval(window.connTimer);
    playSound("reveal");

    // 1. Calculate the final score
    let timeBonus = Math.floor(window.connTimeLeft / 10);
    let finalScore = isTimeUp ? 0 : (window.currentScore + timeBonus);

    // 2. REPLACE the "Potential Score" with "Final Score"
    const scoreDisplay = document.getElementById("score");
    scoreDisplay.innerHTML = `Final Score: ${finalScore}`;
    scoreDisplay.style.color = isTimeUp ? "#e74c3c" : "#2ecc71"; // Red if time up, Green if win

    // 3. Show the answer in the answer box
    const ansDisplay = document.getElementById("cAns");
    if (isTimeUp) {
        ansDisplay.innerHTML = `<span style="color:#e74c3c">TIME'S UP!</span><br>
                                <span style="color:#fff">${window.currentSet.answer}</span>`;
    } else {
        ansDisplay.innerHTML = `<span style="color:#fff">Answer: ${window.currentSet.answer}</span>`;
    }
}

function nextClue(){
    if(window.clueIdx < window.currentSet.clues.length){
        if(window.clueIdx > 0) window.currentScore -= 2;
        document.getElementById("score").innerText = `Potential Score: ${window.currentScore}`;
        let div = document.createElement("div");
        div.className = "clue";
        div.innerText = window.currentSet.clues[window.clueIdx];
        document.getElementById("clueBox").appendChild(div);
        window.clueIdx++;
    }
}

// ODD ONE OUT EXPLANATION LOGIC
function loadOdd(){
    let set = oddData[Math.floor(Math.random()*oddData.length)];
    let opts = [...set.options].sort(()=>Math.random()-0.5);
    let html = `<div class="row-fixed">`;
    opts.forEach(o => { html += `<div class="tile" onclick="evalAns(this,'${o.replace(/'/g,"\\'")}','${set.answer.replace(/'/g,"\\")}')">${o}</div>`; });
    html += `</div>
        <div id="oddAns" class="answer"></div>
        <button class="btn-odd" onclick="revealOdd('${set.answer.replace(/'/g,"\\'")}', '${set.reason.replace(/'/g,"\\'")}')">Answer & Explanation</button>
        <br><br>
        <button class="btn-ui" onclick="startGame('odd')">Next Puzzle</button>
        <button class="btn-ui" onclick="showMenu()">⬅ Home</button>`;
    document.getElementById("gameArea").innerHTML = html;
}

function revealOdd(ans, reason){
    playSound("reveal");
    document.getElementById("oddAns").innerHTML = `<span style="color:#fff; font-size:1.6rem; font-weight:800">Answer: ${ans}</span><br><small style="font-size:1.1rem; font-weight:400; opacity:0.9;">${reason}</small>`;
}

// COMMON HELPERS
function evalAns(el, choice, correct){ 
    if(choice === correct) { playSound("correct"); el.classList.add("correct"); } 
    else { playSound("wrong"); el.classList.add("wrong"); } 
}

// MINIMAL WALL / DATE / SAYINGS (To keep code clean but functional)
function loadWall(){
    // Clear existing timer if any
    if(window.wallTimer) clearInterval(window.wallTimer);

    let set = wallData[Math.floor(Math.random() * wallData.length)]; 
    let tiles = set.groups.flat().sort(() => Math.random() - 0.5);
    
    let html = `<div class="grid">`;
    tiles.forEach(t => { html += `<div class="tile" onclick="selectTile(this,'${t}')">${t}</div>`; });
    html += `</div>
        <div style="margin-top:10px;">
            <button class="btn-wall" onclick="checkGroup()">Check Group</button>
            <button class="btn-wall" style="background:rgba(255,255,255,0.2)" onclick="revealWall()">Reveal All</button>
        </div>
        <div style="margin-top:10px;">
            <button class="btn-ui" onclick="startGame('wall')">Next Wall</button>
            <button class="btn-ui" onclick="showMenu()">⬅ Home</button>
        </div>
        <!-- Progress Timer Bar -->
        <div class="timer-container">
            <div id="wallTimerBar" class="timer-bar"></div>
        </div>`;
        
    document.getElementById("gameArea").innerHTML = html; 
    window.currentWall = set; 
    window.selectedTiles = [];
    
    // Start Timer Logic (60 Seconds)
    let timeLeft = 60;
    const timerBar = document.getElementById("wallTimerBar");
    window.wallTimer = setInterval(() => {
        timeLeft--;
        let percentage = (timeLeft / 60) * 100;
        timerBar.style.width = percentage + "%";
        
        if(timeLeft <= 0) {
            clearInterval(window.wallTimer);
            revealWall(); // Auto-reveal when time is up
        }
    }, 1000);
}

function selectTile(el, word){ 
    // Do nothing if the tile is already correctly solved
    if(el.classList.contains("correct")) return;

    if(el.classList.contains("selected")){ 
        el.classList.remove("selected"); 
        window.selectedTiles = window.selectedTiles.filter(w=>w!==word); 
    }
    else if(window.selectedTiles.length < 3){ 
        el.classList.add("selected"); 
        window.selectedTiles.push(word); 
    }
}

function checkGroup(){
    let correct = window.currentWall.groups.find(g => g.every(w => window.selectedTiles.includes(w)));
    
    if(correct) { 
        playSound("correct"); 
        // Turn selected tiles into 'correct' and remove 'selected' class
        document.querySelectorAll(".selected").forEach(t => {
            t.classList.remove("selected");
            t.classList.add("correct");
        });
    } else { 
        playSound("wrong"); 
        document.querySelectorAll(".selected").forEach(t => t.classList.remove("selected")); 
    }
    window.selectedTiles = []; // Reset selection for the next group
}
function loadDate(){
    // Pick a random date from the array
    let set = dateData[Math.floor(Math.random() * dateData.length)];
    
    // Shuffle the options so the answer isn't always in the same spot
    let shuffledOptions = [...set.options].sort(() => Math.random() - 0.5);

    let html = `
        <div class="date-clue">${set.date}</div>
        <div class="grid">`;
    
    shuffledOptions.forEach(o => { 
        // We escape apostrophes to prevent JavaScript errors in names/titles
        html += `<div class="tile" onclick="evalAns(this,'${o.replace(/'/g,"\\'")}','${set.answer.replace(/'/g,"\\")}')">${o}</div>`; 
    });

    html += `</div>
        <div style="margin-top:20px;">
            <button class="btn-ui" onclick="startGame('date')">Next Date</button>
            <button class="btn-ui" onclick="showMenu()">⬅ Home</button>
        </div>`;
        
    document.getElementById("gameArea").innerHTML = html;
}


function loadSayings(){
    // Pick a random saying
    let set = sayingsData[Math.floor(Math.random() * sayingsData.length)];
    
    // Build the full interface at once
    document.getElementById("gameArea").innerHTML = `
        <div class="saying-text">"${set.phrase}"</div>
        <div id="sAns" class="answer" style="min-height: 50px; margin-bottom: 20px;"></div>
        
        <div style="margin-bottom: 20px;">
            <button class="btn-sayings" onclick="document.getElementById('sAns').innerText='${set.meaning.replace(/'/g,"\\'")}'">Meaning</button>
        </div>

        <div style="margin-top:10px">
            <button class="btn-ui" onclick="startGame('sayings')">Next Saying</button>
            <button class="btn-ui" onclick="showMenu()">⬅ Home</button>
        </div>`;
}
