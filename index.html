<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Games - Ultimate Edition</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            text-align: center;
            color: #fff;
            margin: 0;
            padding: 10px; /* Tightened padding */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            transition: background 1.2s ease-in-out;
            background-size: 400% 400% !important;
            animation: meshAnimation 15s ease infinite !important;
        }

        @keyframes meshAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* BACKGROUNDS */
        .bg-menu { background: linear-gradient(-45deg, #0f2027, #203a43, #2c5364, #0f2027); }
        .bg-wall { background: linear-gradient(-45deg, #141e30, #243b55, #2c5364, #141e30); }
        .bg-connection { background: linear-gradient(-45deg, #134e5e, #1c3e35, #2c5364, #134e5e); }
        .bg-date { background: linear-gradient(-45deg, #1a2a6c, #2a4858, #3a7bd5, #1a2a6c); }
        .bg-odd { background: linear-gradient(-45deg, #09203f, #134e5e, #2b5876, #09203f); }
        .bg-sayings { background: linear-gradient(-45deg, #2c2201, #41295a, #2f0743, #2c2201); }

        h1 {
            margin-top: 20px; /* Reduced space */
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(2rem, 6vw, 3.2rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 5px;
            background: linear-gradient(to bottom, #fff, #bdc3c7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 1rem;
            max-width: 700px;
            margin-bottom: 25px; /* Reduced space */
            color: #eee;
            line-height: 1.4;
            white-space: pre-line;
        }

        /* COMPACT BUTTONS */
        button {
            font-family: 'Montserrat', sans-serif;
            padding: 12px 24px;
            margin: 6px;
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            color: white;
            backdrop-filter: blur(10px);
            transition: all 0.2s ease;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 8px 15px rgba(0,0,0,0.3); }

        .btn-wall { background: rgba(52, 152, 219, 0.4); }
        .btn-connection { background: rgba(46, 204, 113, 0.4); }
        .btn-date { background: rgba(155, 89, 182, 0.4); }
        .btn-odd { background: rgba(139, 0, 0, 0.6); }
        .btn-sayings { background: rgba(241, 196, 15, 0.4); }
        .btn-ui { background: rgba(255, 255, 255, 0.1); font-size: 10px; padding: 8px 16px; }

        /* NEW BUTTONS AND LOGO */
        .btn-dark { 
            background: rgba(0, 0, 0, 0.6); 
            font-size: 11px; 
            padding: 8px 16px; 
            display: inline-block;
            text-decoration: none;
            color: white;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            margin-top: 15px;
        }

        .home-footer-content {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .logo-glow-link {
            display: inline-block;
            text-decoration: none;
            transition: transform 0.3s ease;
        }

        .logo-glow-link:hover { transform: scale(1.05); }

        .logo-small {
            width: 100px;
            height: auto;
            border-radius: 50%;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.5));
            animation: logoGlow 3s ease-in-out infinite alternate;
        }

        .wa-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(37, 211, 102, 0.2);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid rgba(37, 211, 102, 0.4);
        }

        .wa-icon { width: 18px; height: 18px; }

        @keyframes logoGlow {
            from { filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.3)); }
            to { filter: drop-shadow(0 0 20px rgba(255, 255, 255, 0.8)); }
        }

        /* TIGHTER TILES */
        .tile {
            padding: 15px 10px;
            border-radius: 18px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 60px;
            transition: all 0.2s;
        }

        .selected { background: #3498db !important; }
        .correct { background: #2ecc71 !important; }
        .wrong { background: #e67e22 !important; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 700px; margin: 15px auto; width: 100%; }
        .row-fixed { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 500px; margin: 15px auto; width: 100%; }

        .clue { font-size: 1.1rem; margin: 8px 0; background: rgba(255,255,255,0.08); padding: 12px; border-radius: 12px; text-align: left; border-left: 4px solid #fff; }
        .saying-text { font-size: 2.2rem; font-weight: 800; margin: 20px 0; }
        .date-clue { font-size: 4.5rem; font-weight: 800; margin-bottom: 10px; }
        .answer { margin: 15px 0; font-size: 1.4rem; color: #f1c40f; font-weight: 600; min-height: 30px; }
        .score-display { font-weight: 800; color: #2ecc71; font-size: 1.2rem; margin-bottom: 10px; }

        #gameArea { width: 100%; max-width: 800px; padding-bottom: 80px; }

        .footer {
            position: fixed;
            bottom: 0; width: 100%;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px; font-size: 11px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        @media (max-width: 600px) {
            .grid, .row-fixed { grid-template-columns: repeat(2, 1fr); }
            .date-clue { font-size: 3rem; }
        }
    </style>
</head>
<body class="bg-menu">

<h1 id="title">TIME TO QUIZ</h1>
<div id="subtitle" class="subtitle">
    Interactive English learning games.
    Intuition, accuracy, and logic.
</div>

<div id="gameContainer">
    <div id="menu">
        <button class="btn-wall" onclick="startGame('wall')">The Wall</button>
        <button class="btn-connection" onclick="startGame('connection')">Connections</button>
        <button class="btn-date" onclick="startGame('date')">Chronology</button>
        <button class="btn-odd" onclick="startGame('odd')">Odd One Out</button>
        <button class="btn-sayings" onclick="startGame('sayings')">English Sayings</button>
        
        <div class="home-footer-content">
            <a href="https://wa.me/00393515316723" target="_blank" class="logo-glow-link">
                <div class="wa-container">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="wa-icon" alt="WhatsApp">
                    <img src="logo.png" class="logo-small" alt="Logo">
                </div>
            </a>
            <a href="help.pdf" target="_blank" class="btn-dark">Instructions</a>
        </div>
    </div>
    <div id="gameArea"></div>
</div>

<script>


function revealWall() {
    playSound("reveal");
    const colors = ['#2ecc71', '#3498db', '#9b59b2']; // Green, Blue, Purple
    let html = `<div class="grid">`;
    
    window.currentWall.groups.forEach((group, index) => {
        group.forEach(word => {
            html += `<div class="tile" style="background:${colors[index]} !important; border:none;">${word}</div>`;
        });
    });
    
    html += `</div>`;
    
    // Add the labels/categories below the grid
    html += `<div style="margin-top:20px;">`;
    window.currentWall.labels.forEach((label, index) => {
        html += `<div class="clue" style="border-left-color:${colors[index]}"><strong>Group ${index + 1}:</strong> ${label}</div>`;
    });
    html += `</div>`;
    
    html += `<br><button class="btn-ui" onclick="startGame('wall')">Next Puzzle</button>
             <button class="btn-ui" onclick="showMenu()">⬅ Home</button>`;
             
    document.getElementById("gameArea").innerHTML = html;
}

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    // This line "wakes up" the sound if the browser blocked it
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }

    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    osc.connect(gain); 
    gain.connect(audioCtx.destination);

    // Set sounds based on action
    if (type === "correct") {
        osc.frequency.setValueAtTime(650, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.1);
    } else if (type === "wrong") {
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2);
    } else if (type === "reveal") {
        osc.frequency.setValueAtTime(440, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1);
    } else {
        osc.frequency.value = 400; // Default click
    }

    osc.start(); 
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3);
    osc.stop(audioCtx.currentTime + 0.3);
}

// --- DATA ---
const wallData = [
  { groups: [["look after","give up","find out"], ["money","price","cost"], ["quickly","slowly","carefully"]], labels: ["phrasal verbs","money","adverbs"] },
  { groups: [["teacher","student","principal"],["pen","chalk","board"],["classroom","lesson","homework"]], labels: ["school roles","teaching tools","school context"] },
  { groups: [["raincoat","umbrella","boots"],["sunhat","sunglasses","shorts"],["scarf","gloves","coat"]], labels: ["rain gear","summer wear","winter wear"] },
  { groups: [["doctor","hospital","patient"],["chef","restaurant","menu"],["pilot","airport","flight"]], labels: ["medical","food service","aviation"] },
    { groups: [["walk","hike","stroll"], ["yell","whisper","chat"], ["look","glance","stare"]], labels: ["ways to move","ways to speak","ways to see"] }
];

const connectionData = [
  { clues: ["You use them every day", "They help you communicate", "They change depending on context", "They can be formal or informal"], answer: "Language" },
  { clues: ["It happens every 4 years", "Athletes from all over", "Gold, Silver, and Bronze", "The five rings"], answer: "The Olympic Games" },
  { clues: ["It has a face", "It has two hands", "It doesn't have a body", "It tells you the time"], answer: "A Clock" },
  { clues: ["It whistles but has no mouth", "It runs but has no legs", "You feel it but can't see it", "Moving air"], answer: "The Wind" }
];

const dateData = [
  { date: "1989", options: ["Fall of the Berlin Wall", "World War II begins", "First iPhone released"], answer: "Fall of the Berlin Wall" },
  { date: "1969", options: ["Moon Landing", "First Airplane Flight", "End of WWI"], answer: "Moon Landing" },
  { date: "1492", options: ["Columbus reaches America", "French Revolution", "Black Death ends"], answer: "Columbus reaches America" },
  { date: "1914", options: ["Start of WWI", "Start of WWII", "Vietnam War begins"], answer: "Start of WWI" },
  { date: "1963", options: ["JFK Assassination", "I Have a Dream speech", "Beatlemania begins"], answer: "I Have a Dream speech" }
];

const oddData = [
    { options: ["Be","Have","Do","Go"], answer: "Go", reason: "The others are auxiliary verbs." },
    { options: ["Bridge","Tunnel","Road","Harbour"], answer: "Harbour", reason: "The others are land transport structures." },
    { options: ["Whale","Bat","Penguin","Human"], answer: "Penguin", reason: "The others are mammals; a penguin is a bird." },
    { options: ["Salt","Sugar","Vinegar","Lemon"], answer: "Sugar", reason: "The others are used for savory or sour seasoning." },
    { options: ["Glass","Ice","Steam","Water"], answer: "Glass", reason: "The others are states of H2O." },
    { options: ["Eye","Ear","Nose","Hand"], answer: "Hand", reason: "The others are sensory organs located on the face." }
];

const sayingsData = [
  { phrase: "Break the ice", meaning: "To start a conversation or socialize in a tense situation." },
  { phrase: "Spill the beans", meaning: "To reveal a secret accidentally." },
  { phrase: "Kick the bucket", meaning: "A humorous or informal way to say someone has died." },
  { phrase: "Hit the sack", meaning: "To go to bed or go to sleep." },
  { phrase: "Penny for your thoughts", meaning: "A way to ask someone what they are thinking about." }
];

function showMenu(){
    document.body.className = "bg-menu";
    document.getElementById("title").innerText="TIME TO QUIZ";
    document.getElementById("subtitle").innerText = "Interactive English learning games.\nIntuition, accuracy, and logic.";
    document.getElementById("gameArea").innerHTML = "";
    document.getElementById("menu").innerHTML = `
        <button class="btn-wall" onclick="startGame('wall')">The Wall</button>
        <button class="btn-connection" onclick="startGame('connection')">Connections</button>
        <button class="btn-date" onclick="startGame('date')">Chronology</button>
        <button class="btn-odd" onclick="startGame('odd')">Odd One Out</button>
        <button class="btn-sayings" onclick="startGame('sayings')">English Sayings</button>
        <div class="home-footer-content">
            <a href="https://wa.me/00393515316723" target="_blank" class="logo-glow-link">
                <div class="wa-container">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="wa-icon" alt="WhatsApp">
                    <img src="logo.png" class="logo-small" alt="Logo">
                </div>
            </a>
            <a href="help.pdf" target="_blank" class="btn-dark">Instructions</a>
        </div>
    `;
}

function startGame(type){
    playSound("click");
    document.getElementById("menu").innerHTML=""; 
    document.getElementById("gameArea").innerHTML="";
    if(type==="wall") { document.body.className="bg-wall"; document.getElementById("title").innerText="THE WALL"; loadWall(); }
    if(type==="connection") { document.body.className="bg-connection"; document.getElementById("title").innerText="CONNECTIONS"; loadConnection(); }
    if(type==="date") { document.body.className="bg-date"; document.getElementById("title").innerText="CHRONOLOGY"; loadDate(); }
    if(type==="odd") { document.body.className="bg-odd"; document.getElementById("title").innerText="ODD ONE OUT"; loadOdd(); }
    if(type==="sayings") { document.body.className="bg-sayings"; document.getElementById("title").innerText="ENGLISH SAYINGS"; loadSayings(); }
}

// CONNECTIONS SCORING LOGIC
function loadConnection(){
    let set = connectionData[Math.floor(Math.random()*connectionData.length)];
    window.clueIdx = 0; 
    window.currentSet = set;
    window.currentScore = 10;
    document.getElementById("gameArea").innerHTML = `
        <div id="score" class="score-display">Potential Score: 10</div>
        <div id="clueBox" style="min-height:180px"></div>
        <button class="btn-connection" onclick="nextClue()">Next Clue</button>
        <button class="btn-connection" onclick="revealConnection()">Show Answer</button>
        <div id="cAns" class="answer"></div>
        <div style="margin-top:10px">
            <button class="btn-ui" onclick="startGame('connection')">Next Puzzle</button>
            <button class="btn-ui" onclick="showMenu()">⬅ Home</button>
        </div>`;
    nextClue();
}

function nextClue(){
    if(window.clueIdx < window.currentSet.clues.length){
        if(window.clueIdx > 0) window.currentScore -= 2;
        document.getElementById("score").innerText = `Potential Score: ${window.currentScore}`;
        let div = document.createElement("div");
        div.className = "clue";
        div.innerText = window.currentSet.clues[window.clueIdx];
        document.getElementById("clueBox").appendChild(div);
        window.clueIdx++;
    }
}

function revealConnection(){
    playSound("reveal");
    document.getElementById("cAns").innerText = window.currentSet.answer;
}

// ODD ONE OUT EXPLANATION LOGIC
function loadOdd(){
    let set = oddData[Math.floor(Math.random()*oddData.length)];
    let opts = [...set.options].sort(()=>Math.random()-0.5);
    let html = `<div class="row-fixed">`;
    opts.forEach(o => { html += `<div class="tile" onclick="evalAns(this,'${o.replace(/'/g,"\\'")}','${set.answer.replace(/'/g,"\\")}')">${o}</div>`; });
    html += `</div>
        <div id="oddAns" class="answer"></div>
        <button class="btn-odd" onclick="revealOdd('${set.answer.replace(/'/g,"\\'")}', '${set.reason.replace(/'/g,"\\'")}')">Answer & Explanation</button>
        <br><br>
        <button class="btn-ui" onclick="startGame('odd')">Next Puzzle</button>
        <button class="btn-ui" onclick="showMenu()">⬅ Home</button>`;
    document.getElementById("gameArea").innerHTML = html;
}

function revealOdd(ans, reason){
    playSound("reveal");
    document.getElementById("oddAns").innerHTML = `<span style="color:#fff; font-size:1.6rem; font-weight:800">Answer: ${ans}</span><br><small style="font-size:1.1rem; font-weight:400; opacity:0.9;">${reason}</small>`;
}

// COMMON HELPERS
function evalAns(el, choice, correct){ 
    if(choice === correct) { playSound("correct"); el.classList.add("correct"); } 
    else { playSound("wrong"); el.classList.add("wrong"); } 
}

// MINIMAL WALL / DATE / SAYINGS (To keep code clean but functional)
function loadWall(){
    // Pick a random set from wallData
    let set = wallData[Math.floor(Math.random() * wallData.length)]; 
    let tiles = set.groups.flat().sort(() => Math.random() - 0.5);
    
    let html = `<div class="grid">`;
    tiles.forEach(t => { html += `<div class="tile" onclick="selectTile(this,'${t}')">${t}</div>`; });
    html += `</div>
        <div style="margin-top:10px;">
            <button class="btn-wall" onclick="checkGroup()">Check Group</button>
            <button class="btn-wall" style="background:rgba(255,255,255,0.2)" onclick="revealWall()">Reveal All</button>
        </div>
        <br>
        <button class="btn-ui" onclick="showMenu()">⬅ Home</button>`;
        
    document.getElementById("gameArea").innerHTML = html; 
    window.currentWall = set; 
    window.selectedTiles = [];
}

function selectTile(el, word){ 
    if(el.classList.contains("selected")){ el.classList.remove("selected"); window.selectedTiles = window.selectedTiles.filter(w=>w!==word); }
    else if(window.selectedTiles.length < 3){ el.classList.add("selected"); window.selectedTiles.push(word); }
}
function checkGroup(){
    let correct = window.currentWall.groups.find(g => g.every(w => window.selectedTiles.includes(w)));
    if(correct) { playSound("correct"); document.querySelectorAll(".selected").forEach(t=>t.className="tile correct"); }
    else { playSound("wrong"); document.querySelectorAll(".selected").forEach(t=>t.classList.remove("selected")); }
    window.selectedTiles = [];
}
function loadDate(){
    let set = dateData[0];
    let html = `<div class="date-clue">${set.date}</div><div class="grid">`;
    set.options.forEach(o => { html += `<div class="tile" onclick="evalAns(this,'${o}','${set.answer}')">${o}</div>`; });
    html += `</div><button class="btn-ui" onclick="showMenu()">⬅ Home</button>`;
    document.getElementById("gameArea").innerHTML = html;
}
function loadSayings(){
    let set = sayingsData[0];
    document.getElementById("gameArea").innerHTML = `<div class="saying-text">"${set.phrase}"</div><div id="sAns" class="answer"></div><button class="btn-sayings" onclick="document.getElementById('sAns').innerText='${set.meaning}'">Meaning</button><br><br><button class="btn-ui" onclick="showMenu()">⬅ Home</button>`;
}
</script>

</body>
</html>
